<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS아카이브 | 수학 기출 통합 시스템</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <header class="top-header">
        <div class="header-inner">
            <div class="logo">
                <div class="logo-mark"><div></div><div></div><div></div><div></div></div>
                <span class="logo-name">JS<em>아카이브</em></span>
            </div>
            <nav class="grade-nav">
                <button class="gtab active" data-grade="">전체</button>
                <button class="gtab" data-grade="중1">중1</button>
                <button class="gtab" data-grade="중2">중2</button>
                <button class="gtab" data-grade="중3">중3</button>
                <button class="gtab" data-grade="고1">고1</button>
                <button class="gtab" data-grade="고2">고2</button>
                <button class="gtab" data-grade="고3">고3</button>
            </nav>
            <div class="header-right">
                <button class="mixer-btn" id="btn-go-mixer">
                    <span class="mixer-btn-icon"></span>
                    출제 믹서 <span id="global-cart-count" class="cart-badge">0</span>
                </button>
            </div>
        </div>
    </header>

    <div id="tab-search" class="app-panel active">
        <section class="hero">
            <div class="hero-grid-bg"></div>
            <div class="hero-deco">
                <div>∫ f(x) dx</div>
                <div>lim<sub>n→∞</sub> aₙ</div>
                <div>∑ k²</div>
            </div>
            <div class="hero-inner">
                <div class="hero-left">
                    <div class="hero-eyebrow">
                        <span class="eyebrow-dot"></span>
                        <span>AP 수학학원 · 기출 통합 시스템</span>
                    </div>
                    <h1 class="hero-title">학교별 기출 &amp; 변형<br><em>통합 출제 시스템</em></h1>
                    <p class="hero-desc">시험지 · 해설지 · 정답표를 한 번에<br>엔진 렌더링 + 통합 믹서 출제</p>
                </div>
                <div class="stat-pills">
                    <div class="stat-pill">
                        <div class="stat-n" id="stat-total-exam">0</div>
                        <div class="stat-l">엔진기출</div>
                    </div>
                    <div class="stat-pill">
                        <div class="stat-n" id="stat-total-school">0</div>
                        <div class="stat-l">학교</div>
                    </div>
                    <div class="stat-pill">
                        <div class="stat-n" id="stat-total-year">0</div>
                        <div class="stat-l">연도</div>
                    </div>
                </div>
            </div>
        </section>

        <div class="filter-band">
            <div class="filter-inner">
                <div class="fb-search">
                    <span class="fb-search-icon">🔍</span>
                    <input type="text" id="search-keyword" placeholder="학교명 또는 키워드 검색..." autocomplete="off">
                </div>
                <div class="fb-divider"></div>
                <div class="fb-sel-group">
                    <select id="filter-subject" class="fb-sel"><option value="">모든 과목</option></select>
                    <select id="filter-year" class="fb-sel"><option value="">모든 연도</option></select>
                    <select id="filter-examtype" class="fb-sel"><option value="">모든 시험</option></select>
                </div>
                <button id="btn-reset-filter" class="fb-reset">초기화</button>
                <span id="search-count" class="count-label">0건</span>
            </div>
        </div>

        <div class="content-wrap">
            <div id="exam-grid" class="card-grid"></div>
        </div>
    </div>

    <div id="tab-mixer" class="app-panel">
        <div class="mixer-wrap">
          
          <div class="mx-panel" id="mx-panel-exams">
            <div class="mx-panel-header">
              <div class="mixer-info">
                <button class="back-btn" id="btn-back-search">← 목록으로</button>
                <span class="mx-panel-title">시험지 목록</span>
              </div>
              <div class="mx-panel-meta">
                선택 <span id="selected-exam-count">0</span>개
                <span id="selected-exam-meta" style="color:#94a3b8; margin-left:6px;"></span>
              </div>
            </div>
            <div class="mx-filter">
              <div class="mx-search-wrap">
                <input type="text" id="mx-search" placeholder="학교명 검색..." autocomplete="off">
              </div>
              <div class="mx-filter-row">
                <select id="mx-grade"><option value="">모든 학년</option></select>
                <select id="mx-year"><option value="">모든 연도</option></select>
                <select id="mx-exam">
                    <option value="">모든 시험</option>
                    <option value="1학기중간">1학기 중간</option>
                    <option value="1학기기말">1학기 기말</option>
                    <option value="2학기중간">2학기 중간</option>
                    <option value="2학기기말">2학기 기말</option>
                </select>
              </div>
            </div>
            <div class="mx-list-scroll">
              <div id="mx-exam-list"></div>
            </div>
            <div class="mx-bulk-bar">
              <div class="mx-bulk-top">
                <span>선택 시험지 출제 source</span>
              </div>
              <div class="mx-bulk-actions">
                <button class="mx-action-btn" id="mx-btn-select-all">필터 전체 선택</button>
                <button class="mx-action-btn" id="mx-btn-deselect">선택 해제</button>
                <button class="mx-action-btn primary" id="mx-btn-load-pool">선택 시험지 불러오기</button>
              </div>
            </div>
          </div>
      
          <div class="mx-panel" id="mx-panel-questions">
            <div class="mx-panel-header">
              <span class="mx-panel-title">문항 목록</span>
              <div class="mx-panel-tools">
                <select id="mx-source-mode">
                  <option value="activeExam">현재 시험지</option>
                  <option value="selectedExams">선택 pool</option>
                </select>
                <select id="mx-q-standard-filter"><option value="">표준단원 전체</option></select>
                <button class="mx-action-btn primary" id="mx-btn-load-pool2">현재 표준단원 전체 담기</button>
              </div>
            </div>
            <div class="mx-auto-bar">
              <div class="mx-auto-row">
                <select id="mx-auto-start-unit"><option value="">시작 단원</option></select>
                <span>~</span>
                <select id="mx-auto-end-unit"><option value="">끝 단원</option></select>
                <input type="number" id="mx-auto-count" value="24" min="1" max="100" style="width:60px;">
                <select id="mx-auto-level">
                  <option value="all">난이도 전체</option>
                  <option value="하">하</option>
                  <option value="중">중</option>
                  <option value="상">상</option>
                  <option value="balanced">균형</option>
                </select>
                <button class="mx-action-btn primary" id="mx-btn-auto-replace">자동 추출(교체)</button>
                <button class="mx-action-btn" id="mx-btn-auto-append">자동 추출(추가)</button>
              </div>
              <div id="mx-auto-summary" class="mx-auto-summary">자동출제 대기 중</div>
            </div>
            <div class="mx-list-scroll">
              <div id="mx-question-list">
                <div class="mx-empty">시험지를 선택해주세요.</div>
              </div>
            </div>
            <div class="mx-q-count" id="mx-q-count-info"></div>
          </div>
      
          <div class="mx-panel" id="mx-panel-cart">
            <div class="mx-panel-header">
              <span class="mx-panel-title">선택 바구니</span>
              <span id="mx-cart-total-top" class="mx-panel-meta">0문항</span>
            </div>
            <div class="mx-list-scroll">
              <div id="mx-cart-list">
                <div class="mx-empty">담긴 문항이 없습니다.</div>
              </div>
            </div>
            <div class="mx-cart-footer">
              <div class="mx-cart-stats">
                총 <span id="mx-cart-total">0</span>문항 선택됨
              </div>
              <div id="mx-cart-meta-note" style="font-size:12px; color:#94a3b8; text-align:center; margin-bottom:12px;"></div>
              <div class="mx-setting-row">
                <label>시험지 제목</label>
                <select id="mx-print-title-mode">
                  <option value="auto">제목 자동</option>
                  <option value="daily">일일평가</option>
                  <option value="weekly">주간평가</option>
                  <option value="exam">시험지</option>
                </select>
              </div>
              <input type="text" id="mx-custom-title" placeholder="제목 직접 입력 (선택)" style="width:100%; margin:8px 0; padding:8px; border:1px solid #e2e8f0; border-radius:8px; font-family:inherit; font-size:13px;">
              <div class="mx-setting-row">
                <label>단 구성</label>
                <select id="mx-print-qpp">
                  <option value="4">4문항 (2×2)</option>
                  <option value="6">6문항 (2×3)</option>
                  <option value="8">8문항 (2×4)</option>
                </select>
              </div>
              <div class="mx-btn-group">
                <button class="mx-btn-print primary" id="mx-btn-exam">시험지 출력</button>
                <button class="mx-btn-print sub" id="mx-btn-sol">해설지 출력</button>
                <button class="mx-btn-print ghost" id="mx-btn-ans">정답표</button>
                <button class="mx-btn-print danger" id="mx-btn-reset-cart">바구니 비우기</button>
              </div>
            </div>
          </div>
        </div>
    </div>

    <div id="qpp-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:9999; align-items:center; justify-content:center;">
        <div style="background:#fff; border-radius:20px; padding:32px 28px; width:360px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.2);">
          <div style="font-size:18px; font-weight:800; color:#0f172a; margin-bottom:8px;">시험지 출력 형식</div>
          <div style="font-size:13px; color:#64748b; margin-bottom:24px;">한 페이지에 몇 문항을 배치할까요?</div>
          <div style="display:flex; gap:10px; justify-content:center; margin-bottom:24px;">
            <button class="qpp-opt" data-qpp="4" style="flex:1; padding:20px 8px; border:1.5px solid #e2e8f0; border-radius:14px; background:#fff; cursor:pointer; font-family:inherit;">
              <div style="font-size:28px; font-weight:800; color:#0f172a;">4</div>
              <div style="font-size:11px; color:#64748b; margin-top:4px;">2 × 2 배열</div>
            </button>
            <button class="qpp-opt" data-qpp="6" style="flex:1; padding:20px 8px; border:1.5px solid #e2e8f0; border-radius:14px; background:#fff; cursor:pointer; font-family:inherit;">
              <div style="font-size:28px; font-weight:800; color:#0f172a;">6</div>
              <div style="font-size:11px; color:#64748b; margin-top:4px;">2 × 3 배열</div>
            </button>
            <button class="qpp-opt" data-qpp="8" style="flex:1; padding:20px 8px; border:1.5px solid #e2e8f0; border-radius:14px; background:#fff; cursor:pointer; font-family:inherit;">
              <div style="font-size:28px; font-weight:800; color:#0f172a;">8</div>
              <div style="font-size:11px; color:#64748b; margin-top:4px;">2 × 4 배열</div>
            </button>
          </div>
          <button id="qpp-cancel" style="background:none; border:none; font-size:14px; color:#94a3b8; cursor:pointer; font-family:inherit; font-weight:600;">취소</button>
        </div>
    </div>

    <script src="data/schema.js"></script>
    <script src="data/db.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
