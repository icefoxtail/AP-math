<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#E9A85D" />
  <title>보드랜드 패밀리</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      position: fixed;
      inset: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      user-select: none;
      touch-action: none;
      background: #7a4a27;
    }
    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 22% 18%, rgba(255,255,255,.12), transparent 18%),
        radial-gradient(circle at 78% 12%, rgba(255,219,146,.12), transparent 22%),
        linear-gradient(135deg, #9B5D31 0%, #6D3C21 45%, #4C2819 100%);
    }
    .boot-screen {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      color: #563018;
      background:
        radial-gradient(circle at 20% 15%, rgba(255,255,255,.16), transparent 18%),
        linear-gradient(135deg, #B87942 0%, #7A4827 58%, #4C2819 100%);
      z-index: 10;
    }
    .boot-card {
      width: min(520px, 84vw);
      padding: 28px;
      border-radius: 34px;
      background: rgba(255,246,218,.92);
      border: 6px solid rgba(255,255,255,.86);
      text-align: center;
      box-shadow: 0 22px 48px rgba(0,0,0,.24), inset 0 3px 0 rgba(255,255,255,.9);
    }
    .boot-title { margin: 0; font-size: clamp(30px, 7vw, 50px); line-height: 1.05; font-weight: 900; }
    .boot-sub { margin: 14px 0 0; font-size: clamp(15px, 3.5vw, 22px); font-weight: 800; color: #8A5A2E; }
    .rotate-screen {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 24px;
      z-index: 20;
      background: linear-gradient(180deg, #6ECFFF, #95DD7B);
      color: #17324a;
      text-align: center;
    }
    .rotate-card {
      width: min(480px, 88vw);
      padding: 28px;
      border-radius: 34px;
      background: rgba(255,255,255,.9);
      border: 6px solid #fff;
      box-shadow: 0 18px 38px rgba(0,0,0,.18), inset 0 3px 0 rgba(255,255,255,.95);
    }
    .rotate-emoji { font-size: 78px; line-height: 1; margin-bottom: 12px; }
    .rotate-title { font-size: clamp(28px, 8vw, 42px); font-weight: 900; line-height: 1.08; }
    .rotate-sub { margin-top: 10px; font-size: clamp(16px, 4vw, 22px); font-weight: 800; color: #386174; }
    canvas { display: block; }
    @media (orientation: portrait) { .rotate-screen { display: grid; } }
  </style>
</head>
<body>
  <main id="app" aria-label="보드랜드 패밀리 게임">
    <div class="boot-screen" id="bootScreen">
      <div class="boot-card">
        <h1 class="boot-title">🎲 보드랜드 패밀리</h1>
        <p class="boot-sub">가로 화면에서 룰렛을 톡 눌러요</p>
      </div>
    </div>
  </main>
  <section class="rotate-screen" aria-hidden="true">
    <div class="rotate-card">
      <div class="rotate-emoji">↔️</div>
      <div class="rotate-title">가로로 돌려서 놀아요</div>
      <div class="rotate-sub">보드게임은 넓은 화면이 좋아요</div>
    </div>
  </section>
  <script src="./vendor/pixi.min.js"></script>
  <script src="./app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js').catch(function () {});
      });
    }
  </script>
</body>
</html>
