<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#E9A85D" />
  <title>보드랜드 패밀리 v2.4</title>
  <link rel="manifest" href="./manifest.json" />
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #7a4a27; }
    body { position: fixed; inset: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; user-select: none; touch-action: none; }
    #app { position: fixed; inset: 0; overflow: hidden; background: linear-gradient(135deg, #9B5D31 0%, #4C2819 100%); }
    .boot-screen { position: fixed; inset: 0; display: grid; place-items: center; color: #563018; background: radial-gradient(circle at 20% 15%, rgba(255,255,255,.16), transparent 18%), linear-gradient(135deg, #B87942 0%, #4C2819 100%); z-index: 10; }
    .boot-card { width: 86px; height: 86px; border-radius: 50%; background: rgba(255,246,218,.88); border: 6px solid rgba(255,255,255,.86); box-shadow: 0 18px 42px rgba(0,0,0,.24); position: relative; }
    .boot-card::before { content: ""; position: absolute; inset: 18px; border-radius: 50%; border: 7px solid rgba(255,255,255,.9); border-top-color: #E9A85D; border-right-color: #FFCF6E; animation: bootSpin .85s linear infinite; }
    @keyframes bootSpin { to { transform: rotate(360deg); } }
    .rotate-screen { position: fixed; inset: 0; display: none; place-items: center; padding: 24px; z-index: 20; background: linear-gradient(180deg, #6ECFFF, #95DD7B); text-align: center; }
    .rotate-card { width: min(480px, 88vw); padding: 28px; border-radius: 34px; background: rgba(255,255,255,.9); border: 6px solid #fff; }
    .rotate-emoji { font-size: 78px; margin-bottom: 12px; }
    .rotate-title { font-size: clamp(28px, 8vw, 42px); font-weight: 900; }
    @media (orientation: portrait) { .rotate-screen { display: grid; } }
  </style>
</head>
<body>
  <main id="app">
    <div class="boot-screen" id="bootScreen"><div class="boot-card" aria-label="로딩 중"></div></div>
  </main>
  <section class="rotate-screen"><div class="rotate-card"><div class="rotate-emoji">↔️</div><div class="rotate-title"></div></div></section>
  <script src="./vendor/pixi.min.js?v=20260514-boardland-start-gate-fix"></script>
  <script src="./js/boardland-family.js?v=20260514-boardland-start-gate-fix"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map((reg) => reg.unregister()));
        } catch (error) {}
      });
    }
    if ('caches' in window) {
      window.addEventListener('load', async () => {
        try {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        } catch (error) {}
      });
    }
  </script>
</body>
</html>
