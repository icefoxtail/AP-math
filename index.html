<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS아카이브 | 수학 기출 통합 시스템</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <header class="top-header">
        <div class="header-inner">
            <div class="logo">
                <div class="logo-mark"><div></div><div></div><div></div><div></div></div>
                <span class="logo-name">JS<em>아카이브</em></span>
            </div>
            <nav class="grade-nav">
                <button class="gtab active" data-grade="">전체</button>
                <button class="gtab" data-grade="중1">중1</button>
                <button class="gtab" data-grade="중2">중2</button>
                <button class="gtab" data-grade="중3">중3</button>
                <button class="gtab" data-grade="고1">고1</button>
                <button class="gtab" data-grade="고2">고2</button>
                <button class="gtab" data-grade="고3">고3</button>
            </nav>
            <div class="header-right">
                <button class="mixer-btn" id="btn-go-mixer">
                    <span class="mixer-btn-icon"></span>
                    출제 믹서 <span id="global-cart-count" class="cart-badge">0</span>
                </button>
            </div>
        </div>
    </header>

    <div id="tab-search" class="app-panel active">

        <section class="hero">
            <div class="hero-grid-bg"></div>
            <div class="hero-deco">
                <div>∫ f(x) dx</div>
                <div>lim<sub>n→∞</sub> aₙ</div>
                <div>∑ k²</div>
            </div>
            <div class="hero-inner">
                <div class="hero-left">
                    <div class="hero-eyebrow">
                        <span class="eyebrow-dot"></span>
                        <span>AP 수학학원 · 기출 통합 시스템</span>
                    </div>
                    <h1 class="hero-title">학교별 기출 &amp; 변형<br><em>통합 출제 시스템</em></h1>
                    <p class="hero-desc">시험지 · 해설지 · 정답표를 한 번에<br>엔진 렌더링 + 통합 믹서 출제</p>
                </div>
                <div class="stat-pills">
                    <div class="stat-pill">
                        <div class="stat-n" id="stat-total-exam">0</div>
                        <div class="stat-l">엔진기출</div>
                    </div>
                    <div class="stat-pill">
                        <div class="stat-n" id="stat-total-school">0</div>
                        <div class="stat-l">학교</div>
                    </div>
                    <div class="stat-pill">
                        <div class="stat-n" id="stat-total-year">0</div>
                        <div class="stat-l">연도</div>
                    </div>
                </div>
            </div>
        </section>

        <div class="filter-band">
            <div class="filter-inner">
                <div class="fb-search">
                    <span class="fb-search-icon">🔍</span>
                    <input type="text" id="search-keyword" placeholder="학교명 또는 키워드 검색..." autocomplete="off">
                </div>
                <div class="fb-divider"></div>
                <div class="fb-sel-group">
                    <select id="filter-subject" class="fb-sel"><option value="">모든 과목</option></select>
                    <select id="filter-year" class="fb-sel"><option value="">모든 연도</option></select>
                    <select id="filter-examtype" class="fb-sel"><option value="">모든 시험</option></select>
                </div>
                <button id="btn-reset-filter" class="fb-reset">초기화</button>
                <span id="search-count" class="count-label">0건</span>
            </div>
        </div>

        <div class="content-wrap">
            <div id="exam-grid" class="card-grid"></div>
        </div>

    </div>

    <div id="tab-mixer" class="app-panel">
        <div class="mixer-header">
            <div class="mixer-info">
                <button class="back-btn" id="btn-back-search">← 목록으로</button>
                <h3>출제 믹서</h3>
                <span id="mixer-count" class="count-label">선택 없음</span>
            </div>
            <button id="btn-clear-cart" class="btn-secondary">전체 비우기</button>
        </div>

        <div class="mixer-settings">
            <div class="setting-item">
                <label for="exam-title">시험지 제목</label>
                <input type="text" id="exam-title" placeholder="예: 2026 1학기 중간고사 대비">
            </div>
            <div class="setting-item">
                <label for="select-qpp">단 구성</label>
                <select id="select-qpp">
                    <option value="1">1단 (크게 보기)</option>
                    <option value="2" selected>2단 (표준)</option>
                    <option value="3">3단 (조밀하게)</option>
                </select>
            </div>
            <div class="info-msg">※ 엔진 문항만 통합 출제 가능합니다.</div>
        </div>

        <div id="mixer-list" class="list-container"></div>

        <div class="mixer-actions">
            <button id="btn-generate-exam" class="btn-primary">시험지 출력</button>
            <button id="btn-generate-solution" class="btn-secondary">해설지 출력</button>
            <button id="btn-generate-answer" class="btn-ghost">정답표</button>
        </div>
    </div>

    <script src="data/schema.js"></script>
    <script src="data/db.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
