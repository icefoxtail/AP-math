<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#67c7ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>보드랜드 패밀리</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./assets/icons/icon.svg" />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.4.2/pixi.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
    html,body,#app{width:100%;height:100%;overflow:hidden;background:#67c7ff;touch-action:none;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",sans-serif}
    body{position:fixed;color:#18324a}
    #app{position:relative}
    canvas{position:absolute;inset:0;width:100%!important;height:100%!important;display:block}
    .rotate-guide{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;background:linear-gradient(180deg,#72d5ff,#ffefb2);text-align:center;padding:28px;color:#14324a}
    .rotate-card{width:min(520px,88vw);border:8px solid #fff;border-radius:36px;background:rgba(255,255,255,.88);box-shadow:0 18px 40px rgba(20,60,90,.22);padding:30px 24px}
    .rotate-icon{font-size:64px;margin-bottom:14px}
    .rotate-title{font-size:30px;font-weight:900;line-height:1.2}
    .rotate-sub{margin-top:10px;font-size:19px;font-weight:800;color:#476575;line-height:1.35}
    .pixi-error{position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;background:#fff7d7;padding:24px;text-align:center;font-weight:900;color:#1f3347}
    .pixi-error.show{display:flex}
    @media (orientation:portrait){.rotate-guide{display:flex}}
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="rotate-guide">
    <div class="rotate-card">
      <div class="rotate-icon">↔️</div>
      <div class="rotate-title">태블릿을 가로로 돌려주세요</div>
      <div class="rotate-sub">보드랜드는 가족이 함께 보는 가로 화면 보드게임이에요.</div>
    </div>
  </div>
  <div id="pixiError" class="pixi-error">
    <div>
      Pixi.js를 불러오지 못했습니다.<br/>
      인터넷 연결을 확인한 뒤 다시 열어주세요.
    </div>
  </div>
  <script src="./app.js"></script>
</body>
</html>
