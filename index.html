<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>JS아카이브 통합 대시보드</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <nav class="top-nav">
        <div class="nav-links">
            <a href="#" class="nav-link active" data-tab="tab-search">기출 검색</a>
            <a href="#" class="nav-link" data-tab="tab-mixer">출제 믹서</a>
        </div>
        <div class="nav-cart">
            장바구니 <span id="global-cart-count" class="cart-badge">0</span>
        </div>
    </nav>

    <div id="tab-search" class="app-panel active">
        <div class="search-filters">
            <div class="filter-group">
                <select id="filter-grade"><option value="">모든 학년</option></select>
                <select id="filter-subject"><option value="">모든 과목</option></select>
                <input type="text" id="search-keyword" placeholder="학교명 또는 키워드 검색..." autocomplete="off">
            </div>
            <div class="filter-actions">
                <button id="btn-reset-filter" class="btn-secondary">초기화</button>
                <span id="search-count" class="count-label">검색 결과: 0건</span>
            </div>
        </div>
        <div id="exam-grid" class="grid-container"></div>
    </div>

    <div id="tab-mixer" class="app-panel">
        <div class="mixer-header">
            <div class="mixer-info">
                <h3>출제 리스트</h3>
                <span id="mixer-count" class="count-label">선택 없음</span>
            </div>
            <button id="btn-clear-cart" class="btn-secondary">전체 비우기</button>
        </div>

        <div class="mixer-settings">
            <div class="setting-item">
                <label for="exam-title">시험지 제목</label>
                <input type="text" id="exam-title" placeholder="예: 2026 1학기 중간고사 대비">
            </div>
            <div class="setting-item">
                <label for="select-qpp">단 구성</label>
                <select id="select-qpp">
                    <option value="1">1단 (크게 보기)</option>
                    <option value="2" selected>2단 (표준)</option>
                    <option value="3">3단 (조밀하게)</option>
                </select>
            </div>
            <div class="info-msg">※ 엔진 문항만 통합 출제 가능합니다.</div>
        </div>

        <div id="mixer-list" class="list-container"></div>

        <div class="mixer-actions">
            <button id="btn-generate-exam" class="btn-primary">시험지 출력</button>
            <button id="btn-generate-solution" class="btn-secondary">해설지 출력</button>
            <button id="btn-generate-answer" class="btn-ghost">정답표</button>
        </div>
    </div>

    <script src="data/schema.js"></script>
    <script src="data/db.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
