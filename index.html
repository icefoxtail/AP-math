  <script>
    (function () {
      var btn = document.getElementById('nativeStartButton');
      if (!btn) return;

      var started = false;
      var start = function () {
        if (started) return;
        started = true;

        if (window.BoardlandNativeStart) {
          window.BoardlandNativeStart();
          return;
        }

        var gate = document.getElementById('nativeStartGate');
        if (gate) gate.classList.add('native-start-hidden');
      };

      btn.addEventListener('pointerdown', function () {
        if (window.BoardlandNativeStart) window.BoardlandNativeStart();
      }, { once: true, capture: true });

      btn.addEventListener('touchstart', function () {
        if (window.BoardlandNativeStart) window.BoardlandNativeStart();
      }, { once: true, passive: true, capture: true });

      btn.addEventListener('click', start, { once: true, capture: true });
    })();
  </script>
