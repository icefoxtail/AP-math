<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Boardland Coordinate Picker</title>
<style>
  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: Arial, "Noto Sans KR", sans-serif;
    background: #15110d;
    color: #fff;
  }

  body {
    display: grid;
    grid-template-columns: 1fr 380px;
  }

  #stageWrap {
    width: 100%;
    height: 100%;
    display: grid;
    place-items: center;
    overflow: hidden;
    background: #1d140f;
  }

  #stage {
    position: relative;
    width: min(calc(100vw - 380px), calc(100vh * 16 / 9));
    aspect-ratio: 16 / 9;
    background: #000;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.25), 0 20px 60px rgba(0,0,0,0.55);
    user-select: none;
    cursor: crosshair;
  }

  #board {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;
    pointer-events: none;
    display: block;
  }

  .point {
    position: absolute;
    width: 34px;
    height: 34px;
    transform: translate(-50%, -50%);
    border-radius: 999px;
    border: 3px solid #fff;
    background: rgba(255, 45, 45, 0.82);
    display: grid;
    place-items: center;
    font-size: 14px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 2px 2px rgba(0,0,0,0.5);
    pointer-events: none;
    box-shadow: 0 4px 10px rgba(0,0,0,0.35);
  }

  .point.tile {
    background: rgba(255, 78, 78, 0.8);
  }

  .point.card {
    background: rgba(131, 80, 255, 0.85);
  }

  .point.gift {
    background: rgba(255, 190, 40, 0.9);
  }

  .point.roulette {
    background: rgba(30, 180, 255, 0.9);
  }

  .point.seat {
    background: rgba(80, 210, 110, 0.9);
  }

  #side {
    height: 100vh;
    overflow: auto;
    padding: 16px;
    background: #24170f;
    border-left: 1px solid rgba(255,255,255,0.18);
  }

  h1 {
    margin: 0 0 10px;
    font-size: 22px;
  }

  .guide {
    margin: 0 0 14px;
    padding: 12px;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    line-height: 1.45;
    font-size: 14px;
    color: #ffe9c7;
  }

  .counter {
    margin: 0 0 12px;
    padding: 12px;
    border-radius: 12px;
    background: #fff3cf;
    color: #42250e;
    font-size: 20px;
    font-weight: 900;
    text-align: center;
  }

  .buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }

  button {
    height: 44px;
    border: 0;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
  }

  #undoBtn {
    background: #ffd166;
    color: #402300;
  }

  #resetBtn {
    background: #ff6b6b;
    color: #fff;
  }

  #copyBtn {
    grid-column: 1 / -1;
    background: #6ee7b7;
    color: #073b2a;
  }

  textarea {
    width: 100%;
    height: 430px;
    resize: vertical;
    border: 0;
    border-radius: 12px;
    padding: 12px;
    background: #0e0b08;
    color: #f8f8f2;
    font-family: Consolas, Monaco, monospace;
    font-size: 12px;
    line-height: 1.45;
    outline: none;
  }

  .list {
    margin-top: 12px;
    display: grid;
    gap: 5px;
    font-size: 12px;
    color: #ddd;
  }

  .row {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 8px;
    background: rgba(255,255,255,0.06);
  }

  .name {
    color: #ffe9c7;
  }

  .xy {
    color: #8fffc1;
    font-family: Consolas, Monaco, monospace;
  }

  .load-error {
    position: absolute;
    inset: 0;
    display: none;
    place-items: center;
    padding: 30px;
    background: #050505;
    color: #ffdddd;
    font-size: 18px;
    font-weight: 900;
    text-align: center;
    line-height: 1.55;
    z-index: 5;
  }

  @media (max-width: 900px) {
    html,
    body {
      overflow: auto;
    }

    body {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
    }

    #stageWrap {
      height: auto;
      padding: 8px;
    }

    #stage {
      width: 100%;
      max-width: 100vw;
    }

    #side {
      height: auto;
      border-left: 0;
      border-top: 1px solid rgba(255,255,255,0.18);
    }
  }
</style>
</head>
<body>
  <main id="stageWrap">
    <div id="stage">
      <img id="board" src="./assets/board/board-main.png" alt="board" />
      <div id="loadError" class="load-error">
        board-main.png를 불러오지 못했습니다.<br />
        위치를 확인하세요.<br /><br />
        family-boardland/assets/board/board-main.png
      </div>
    </div>
  </main>

  <aside id="side">
    <h1>좌표 찍기</h1>

    <div class="guide">
      클릭 순서 고정<br>
      1~24: 보드칸<br>
      25: 카드더미<br>
      26: 선물상자<br>
      27: 룰렛 중심<br>
      28~31: 말 시작 위치 4개
    </div>

    <div class="counter" id="counter">다음: 1번 보드칸</div>

    <div class="buttons">
      <button id="undoBtn" type="button">되돌리기</button>
      <button id="resetBtn" type="button">전체삭제</button>
      <button id="copyBtn" type="button">좌표 복사</button>
    </div>

    <textarea id="output" spellcheck="false"></textarea>
    <div class="list" id="list"></div>
  </aside>

<script>
(function () {
  'use strict';

  const DESIGN_W = 1600;
  const DESIGN_H = 900;
  const MAX_POINTS = 31;

  const stage = document.getElementById('stage');
  const board = document.getElementById('board');
  const loadError = document.getElementById('loadError');
  const counter = document.getElementById('counter');
  const output = document.getElementById('output');
  const list = document.getElementById('list');
  const undoBtn = document.getElementById('undoBtn');
  const resetBtn = document.getElementById('resetBtn');
  const copyBtn = document.getElementById('copyBtn');

  const points = [];

  board.addEventListener('error', function () {
    loadError.style.display = 'grid';
  });

  board.addEventListener('load', function () {
    loadError.style.display = 'none';
  });

  function getPointName(index) {
    if (index >= 1 && index <= 24) return `${index}번 보드칸`;
    if (index === 25) return '카드더미';
    if (index === 26) return '선물상자';
    if (index === 27) return '룰렛 중심';
    if (index >= 28 && index <= 31) return `${index - 27}번 말 시작 위치`;
    return `${index}번`;
  }

  function getPointClass(index) {
    if (index >= 1 && index <= 24) return 'tile';
    if (index === 25) return 'card';
    if (index === 26) return 'gift';
    if (index === 27) return 'roulette';
    if (index >= 28 && index <= 31) return 'seat';
    return 'tile';
  }

  function renderPoints() {
    stage.querySelectorAll('.point').forEach(el => el.remove());

    points.forEach((p, i) => {
      const idx = i + 1;
      const dot = document.createElement('div');
      dot.className = `point ${getPointClass(idx)}`;
      dot.style.left = `${p.x / DESIGN_W * 100}%`;
      dot.style.top = `${p.y / DESIGN_H * 100}%`;
      dot.textContent = String(idx);
      stage.appendChild(dot);
    });
  }

  function buildOutput() {
    const tilePoints = points.slice(0, 24);
    const card = points[24] || { x: 0, y: 0 };
    const gift = points[25] || { x: 0, y: 0 };
    const roulette = points[26] || { x: 0, y: 0 };
    const seats = points.slice(27, 31);

    const tileText = tilePoints
      .map(p => `  { x: ${p.x}, y: ${p.y} }`)
      .join(',\n');

    const seatText = seats
      .map(p => `  { x: ${p.x}, y: ${p.y} }`)
      .join(',\n');

    return `const TILE_COORDS = [
${tileText}
];

const CARD_COORD = { x: ${card.x}, y: ${card.y} };
const GIFT_COORD = { x: ${gift.x}, y: ${gift.y} };
const ROULETTE_COORD = { x: ${roulette.x}, y: ${roulette.y} };

const PLAYER_SEAT_COORDS = [
${seatText}
];`;
  }

  function renderList() {
    list.innerHTML = '';

    points.forEach((p, i) => {
      const idx = i + 1;
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = `
        <span class="name">${idx}. ${getPointName(idx)}</span>
        <span class="xy">x:${p.x}, y:${p.y}</span>
      `;
      list.appendChild(row);
    });
  }

  function update() {
    renderPoints();
    renderList();
    output.value = buildOutput();

    const next = points.length + 1;
    if (next <= MAX_POINTS) {
      counter.textContent = `다음: ${next}번 ${getPointName(next)}`;
    } else {
      counter.textContent = '좌표 완료';
    }
  }

  function addPoint(clientX, clientY) {
    if (points.length >= MAX_POINTS) return;

    const rect = stage.getBoundingClientRect();
    const px = (clientX - rect.left) / rect.width;
    const py = (clientY - rect.top) / rect.height;

    const x = Math.round(px * DESIGN_W);
    const y = Math.round(py * DESIGN_H);

    points.push({ x, y });
    update();
  }

  stage.addEventListener('click', function (event) {
    if (event.target === loadError) return;
    addPoint(event.clientX, event.clientY);
  });

  undoBtn.addEventListener('click', function () {
    points.pop();
    update();
  });

  resetBtn.addEventListener('click', function () {
    if (!confirm('좌표를 전부 삭제할까요?')) return;
    points.length = 0;
    update();
  });

  copyBtn.addEventListener('click', async function () {
    output.select();
    output.setSelectionRange(0, output.value.length);

    try {
      await navigator.clipboard.writeText(output.value);
      copyBtn.textContent = '복사 완료';
      setTimeout(() => {
        copyBtn.textContent = '좌표 복사';
      }, 900);
    } catch (error) {
      document.execCommand('copy');
      copyBtn.textContent = '복사 완료';
      setTimeout(() => {
        copyBtn.textContent = '좌표 복사';
      }, 900);
    }
  });

  update();
})();
</script>
</body>
</html>
