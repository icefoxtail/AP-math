<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS아카이브 | 로컬 데이터 정밀 검수기</title>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$']],
                displayMath: [['$$', '$$']],
                packages: {'[+]': ['ams', 'boldsymbol']}
            },
            options: { enableMenu: false },
            startup: { typeset: false }
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap');
        
        body {
            background-color: #f8fafc;
            font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
            transition: background-color 0.3s;
        }

        .paper {
            background: white;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.01);
            border-radius: 12px;
            position: relative;
            z-index: 10;
        }

        .question-card {
            border-bottom: 2px dashed #e2e8f0;
            padding-bottom: 2.5rem;
            margin-bottom: 2.5rem;
        }

        .question-card:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .mathjax-box {
            font-family: 'Nanum Myeongjo', serif;
            font-size: 11pt;
            line-height: 1.65;
            word-break: keep-all;
            overflow-wrap: anywhere;
            color: #0f172a;
        }

        .choice-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 0.5rem;
            gap: 0.75rem;
        }

        .choice-num {
            font-weight: 800;
            font-family: sans-serif;
            width: 24px;
            height: 24px;
            border: 1px solid #cbd5e1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            flex-shrink: 0;
            margin-top: 3px;
            background: #f1f5f9;
            color: #475569;
        }

        .meta-badge {
            background: #e2e8f0;
            color: #334155;
            padding: 3px 10px;
            font-size: 0.75rem;
            border-radius: 6px;
            font-weight: 700;
        }

        .answer-badge {
            background: #1d4ed8;
            color: #fff;
            padding: 4px 12px;
            font-size: 0.9rem;
            border-radius: 6px;
            font-weight: 800;
            font-family: 'Nanum Myeongjo', serif;
        }

        .solution-box {
            background: #f8fafc;
            padding: 1.5rem;
            border-radius: 8px;
            border-left: 4px solid #3b82f6;
            margin-top: 1.5rem;
        }

        .solution-label {
            font-weight: 800;
            font-size: 0.85rem;
            color: #3b82f6;
            margin-bottom: 0.75rem;
            font-family: sans-serif;
        }

        .mathjax-box svg {
            max-width: 100%;
            height: auto;
            margin: 10px auto;
            display: block;
        }

        .mathjax-box table {
            border-collapse: collapse;
            margin: 15px auto;
            font-size: 10pt;
            width: auto;
            max-width: 100%;
            background: #fff;
        }

        .mathjax-box table, .mathjax-box th, .mathjax-box td {
            border: 1px solid #000;
        }

        .mathjax-box th, .mathjax-box td {
            padding: 6px 12px;
            text-align: center;
        }

        #drag-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: white;
            transition: all 0.2s;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }

        body.drag-over #drag-overlay { display: flex; }
        body.drag-over { background-color: #94a3b8; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="drag-overlay">
        <div class="text-7xl mb-6">📥</div>
        <p class="text-3xl font-extrabold text-center">
            파일을 여기에 놓아 즉시 렌더링<br>
            <span class="text-base font-normal text-blue-200 mt-2 block">(.js / .json 파일의 수식과 도형을 엔진과 동일하게 검수합니다)</span>
        </p>
    </div>

    <div class="max-w-5xl mx-auto">
        <div class="paper p-6 md:p-10">
            <header class="border-b-2 border-slate-200 pb-6 mb-8 flex justify-between items-end gap-4 flex-wrap">
                <div>
                    <h1 id="exam-title" class="text-2xl font-extrabold text-slate-800 tracking-tight">파일을 드래그하거나 선택하세요</h1>
                    <p class="text-slate-500 mt-2 text-sm font-medium">JS아카이브 수리·기하 데이터 로컬 정밀 검수 모드</p>
                </div>
                <div class="flex flex-col items-end gap-2">
                    <label for="file-input" class="cursor-pointer bg-slate-800 text-white px-5 py-2.5 rounded-lg font-bold hover:bg-slate-700 transition shadow-sm text-sm">
                        파일 찾아보기 (.js)
                    </label>
                    <input type="file" id="file-input" accept=".js,.json" class="hidden">
                    <span id="file-count" class="text-xs text-slate-400 font-medium">대기 중</span>
                </div>
            </header>

            <div id="question-list">
                <div class="py-24 text-center text-slate-400 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50">
                    <i class="fa-solid fa-file-code text-4xl mb-4 text-slate-300"></i><br>
                    작업하신 JS/JSON 파일을 화면에 <b>드래그 앤 드롭</b> 하십시오.
                </div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const fileCount = document.getElementById('file-count');
        const titleElem = document.getElementById('exam-title');
        const listElem = document.getElementById('question-list');

        function wrapLatex(text) {
            if (text == null) return '';
            let s = String(text);
            s = s.replace(/\\\([\s\S]+?\\\)/g, m => '$' + m.slice(2, -2) + '$');
            s = s.replace(/\\\[[\s\S]+?\\\]/g, m => '$$' + m.slice(2, -2) + '$$');

            const combRepl = T => (m, a1, a2, b1, b2) => `$_{${a1||a2}}${T}_{${b1||b2}}$`;
            const combPat = prefix => new RegExp(`(?:\\{\\}|\\[\\])_(?:\\{([^}]+)\\}|([a-zA-Z0-9+\\-]+))${prefix}_(?:\\{([^}]+)\\}|([a-zA-Z0-9+\\-]+))`, 'g');

            const htmlTags = [];
            s = s.replace(/<svg[\s\S]*?<\/svg>|<img[^>]*>|<br\s*\/?>|<\/?(div|span|b|i|strong|em|u|sup|sub|table|thead|tbody|tr|td|th|ul|ol|li)[^>]*>/gi, m => {
                const token = `__HTMLTAG_${htmlTags.length}__`;
                htmlTags.push(m);
                return token;
            });

            s = s.split(/(\$\$[\s\S]*?\$\$|\$[^$\n]*?\$)/g).map((seg, idx) => {
                if (idx % 2 === 1) return seg;
                let t = seg;
                t = t.replace(combPat('C'), combRepl('C'));
                t = t.replace(combPat('H'), combRepl('H'));
                t = t.replace(combPat('P'), combRepl('P'));
                return t.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            }).join('');

            s = s.split(/(\$\$[\s\S]*?\$\$|\$[^$\n]*?\$|__HTMLTAG_\d+__)/g).map((seg, idx) => {
                if (idx % 2 === 1) return seg;
                const trimmed = seg.trim();
                if (!trimmed) return seg;
                const hasKorean = /[가-힣]/.test(seg);
                const hasLatex = /\\[a-zA-Z]/.test(seg);
                if (!hasKorean && /\\begin\{(cases|aligned|array|matrix|pmatrix|bmatrix|vmatrix|Vmatrix)\}/.test(seg)) {
                    return `$$${seg}$$`;
                }
                if (!hasKorean && hasLatex && /^[0-9a-zA-Z\s\+\-\*\/\=\^\{\}\(\)\[\]_\.,\\!;:]+$/.test(trimmed)) {
                    return `$${trimmed}$`;
                }
                if (hasKorean && hasLatex) {
                    return seg.replace(/(\\[a-zA-Z]+(?:\{[^}]*\})*(?:\{[^}]*\})*(?:_\{?[^}\s]+\}?)?(?:\^\{?[^}\s]+\}?)?)/g, '$$$1$$');
                }
                return seg;
            }).join('');

            s = s.split(/(\$\$[\s\S]*?\$\$|\$[^$\n]*?\$)/g).map((seg, idx) => {
                if (idx % 2 === 1) return seg;
                return seg.replace(/(\\\{(?:[^{}]|\{[^}]*\})*\\\})/g, '$$$1$$');
            }).join('');

            s = s.replace(/\\n(?![a-zA-Z])/g, '<br>').replace(/\r\n|\r|\n/g, '<br>');
            return s.replace(/__HTMLTAG_(\d+)__/g, (_, i) => htmlTags[i] || '');
        }

        function extractChoice(c) {
            if (c === null || c === undefined) return '';
            if (typeof c === 'object') return c.text || c.content || c.value || c.answer || Object.values(c)[0] || '';
            return String(c);
        }

        function stripChoicePrefix(text) {
            return String(text || '').replace(/^\s*(?:[①②③④⑤⑥⑦⑧⑨⑩]|\(?\d+\)|\d+\.|\d+\))\s*/, '').trim();
        }

        window.addEventListener('dragover', (e) => {
            e.preventDefault();
            document.body.classList.add('drag-over');
        });

        window.addEventListener('dragleave', (e) => {
            if (e.relatedTarget === null) document.body.classList.remove('drag-over');
        });

        window.addEventListener('drop', (e) => {
            e.preventDefault();
            document.body.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        };

        async function handleFile(file) {
            fileCount.innerText = `로드 완료: ${file.name}`;
            listElem.innerHTML = '<div class="py-20 text-center font-bold text-blue-500">엔진 시뮬레이션 렌더링 중...</div>';
            
            try {
                const text = await file.text();
                const trimmedText = text.trim();
                let data = null;

                try {
                    data = JSON.parse(trimmedText);
                } catch (e1) {
                    try {
                        const expression = trimmedText.replace(/;+$/, '');
                        data = new Function(`return (${expression})`)();
                    } catch (e2) {
                        await new Promise((resolve, reject) => {
                            const blob = new Blob([text], { type: 'application/javascript' });
                            const url = URL.createObjectURL(blob);
                            const script = document.createElement('script');
                            script.src = url;
                            script.onload = () => { URL.revokeObjectURL(url); resolve(); };
                            script.onerror = () => { URL.revokeObjectURL(url); reject(new Error("JS 로드 실패")); };
                            document.body.appendChild(script);
                        });
                    }
                }

                let qb = null;
                let examTitle = file.name;

                if (Array.isArray(data)) {
                    qb = data;
                } else if (data && typeof data === 'object') {
                    if (Array.isArray(data.questionBank)) qb = data.questionBank;
                    else if (Array.isArray(data.exams)) qb = data.exams;
                    if (data.examTitle) examTitle = data.examTitle;
                } else {
                    qb = window.questionBank || (window.mainDB ? window.mainDB.exams : null);
                    examTitle = window.examTitle || file.name;
                }

                if (!qb || !Array.isArray(qb)) {
                    throw new Error('문항 데이터를 찾을 수 없습니다.');
                }

                // 🚨 핵심 패치: 2중, 3중 괄호 [[{...}]] 평탄화 (Flatten)
                qb = qb.flat(Infinity);
                
                // 평탄화 후 배열 내부가 정상 객체인지 확인
                if (qb.length > 0 && typeof qb[0] !== 'object') {
                    throw new Error('문항 데이터가 올바른 JSON 객체 형식이 아닙니다.');
                }

                titleElem.innerText = examTitle;
                renderExamList(qb);

                if (window.MathJax && MathJax.typesetPromise) {
                    await MathJax.typesetPromise([listElem]);
                }

            } catch (err) {
                console.error(err);
                listElem.innerHTML = `<div class="p-5 bg-red-50 text-red-600 border border-red-200 rounded-lg font-bold">❌ 오류 발생: ${err.message}</div>`;
            }
        }

        function renderExamList(questions) {
            listElem.innerHTML = '';
            
            questions.forEach((q, idx) => {
                const card = document.createElement('div');
                card.className = 'question-card';

                const qid = q.id ?? (idx + 1);
                const category = q.category || q.standardUnitName || '미분류';
                const level = q.level || '-';
                const content = wrapLatex(q.content || q.question || '');
                const solution = wrapLatex(q.solution || '해설 없음');
                const answer = wrapLatex(q.answer || '–');
                const choices = Array.isArray(q.choices) ? q.choices : [];

                const circled = ['①','②','③','④','⑤'];
                const isMultipleChoice = choices.length > 0 && choices[0] !== "주관식" && choices.some(c => extractChoice(c).trim() !== "");
                
                const choicesHtml = isMultipleChoice ? choices.map((c, i) => `
                    <div class="choice-item">
                        <span class="choice-num">${circled[i] || (i + 1)}</span>
                        <span class="mathjax-box flex-1">${wrapLatex(stripChoicePrefix(extractChoice(c)))}</span>
                    </div>
                `).join('') : '';

                const choicesBlock = choicesHtml 
                    ? `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mt-6 bg-slate-50 border border-slate-100 p-4 rounded-lg">${choicesHtml}</div>`
                    : '';

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4 gap-3 flex-wrap">
                        <div class="flex items-center gap-3">
                            <span class="font-extrabold text-xl text-slate-800">#${qid}</span>
                            <span class="meta-badge">${category}</span>
                            <span class="meta-badge bg-slate-100">난이도: ${level}</span>
                        </div>
                        <span class="answer-badge">정답: ${answer}</span>
                    </div>

                    <div class="mathjax-box mb-2">
                        ${content}
                    </div>

                    ${choicesBlock}

                    <div class="solution-box">
                        <p class="solution-label"><i class="fa-solid fa-key mr-1"></i> 해설 및 키포인트</p>
                        <div class="mathjax-box text-sm text-slate-700">
                            ${solution}
                        </div>
                    </div>
                `;
                listElem.appendChild(card);
            });
        }
    </script>
</body>
</html>
